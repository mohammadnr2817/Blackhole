<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <p class="eyebrow">Blackhole</p>
                <h1>Focus guard</h1>
            </div>
            <span id="url_count" class="count">0 blocks</span>
        </header>

        <main>
            <section class="section current-site">
                <button id="btn_block_current" class="wide-button">Block current site</button>
                <p id="current_site" class="hint">Current tab will appear here.</p>
            </section>

            <section class="section">
                <label for="field_add_url">Blocked website</label>
                <div class="input-group">
                    <input type="text" id="field_add_url" placeholder="example.com">
                    <button id="btn_add_url">Add</button>
                </div>
                <p class="hint">Use a domain or URL fragment. Any matching tab will be redirected.</p>
            </section>

            <section class="section">
                <div class="section-title">
                    <h2>Recent blocks</h2>
                    <span id="empty_state">No blocked visits yet.</span>
                </div>
                <ul id="list_urls"></ul>
            </section>

            <section class="section settings-link">
                <button id="btn_open_settings" class="secondary-button">Open settings</button>
                <p id="status_message" class="status" role="status"></p>
            </section>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
